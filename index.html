<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drill 2</title>

    <script scr="main.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<body>

    <div class="container p-8 mt-5 w-45 rounded">
        <h2>Heat Index Checker</h2><hr>
            <details open>
                <summary>Note:</summary>
                <p class="note-text">
                    Input the temperature (°C) and humidity (%), then click Check 
                    to see the heat index and its status.
                </p>
            </details>

                <label>Degree in °C:</label><br>
                <input type="number" id="deg" value="38"><br><br>

                <label>humidity in %:</label><br>
                <input type="number" id="hum" value="67"><br><br>

                <button onclick="checkHeatIndex()">Check</button>


    </div>
    
</body>
</html>
